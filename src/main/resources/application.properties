# Application
spring.application.name=datasync
server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/datasync
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/datasync

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6381

# Kafka
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.consumer.group-id=datasync-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Circuit Breaker
resilience4j.circuitbreaker.instances.datasync.register-health-indicator=true
resilience4j.circuitbreaker.instances.datasync.sliding-window-size=10
resilience4j.circuitbreaker.instances.datasync.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.datasync.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.datasync.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.datasync.failure-rate-threshold=50
resilience4j.retry.instances.datasync.max-attempts=3
resilience4j.retry.instances.datasync.wait-duration=1s

# JWT
app.jwt.secret=datasync-super-secret-key-enterprise-data-integration-platform-2024
app.jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Logging
logging.level.com.datasync=DEBUG
logging.level.org.springframework.cloud=INFO